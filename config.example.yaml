# radar configuration.
#
# Secrets are NEVER stored here. The GitLab connection reads two environment
# variables:
#   GITLAB_URL    e.g. https://gitlab.example.com
#   GITLAB_TOKEN  a personal access token with the read_api scope
#
# Copy this file to config.yaml and edit for your team.

gitlab:
  projects: # list of project paths (group/name) or numeric IDs to monitor
    - group/hub-backend
  poll_interval_minutes: 10

# Where the append-only event store lives (SQLite). Relative to CWD.
database:
  path: radar.db

# Work calendar. SLA business-hours math only consumes time inside these
# windows. Weekends and off-hours never burn SLA budget.
calendar:
  workdays: [mon, tue, wed, thu, fri]
  work_hours: { start: "09:00", end: "18:00" }
  default_timezone: America/New_York
  reviewer_timezones: # per-reviewer overrides; unmapped reviewers use the default
    someuser: Asia/Jerusalem

# SLA rules. First matching rule wins, evaluated top to bottom.
# A `match` block may constrain by target_branch (glob) and/or labels
# (obligation's MR must carry ALL listed labels). An empty match {} is the
# catch-all default and should come last.
slas:
  - match: { target_branch: "release/*" }
    first_response_business_hours: 4
    approval_business_hours: 8
  - match: { labels: ["hotfix"] }
    first_response_business_hours: 4
    approval_business_hours: 8
  - match: {} # default
    first_response_business_hours: 16 # 2 business days
    approval_business_hours: 24

# Obligations matching any of these conditions are WAIVED (excluded from
# stats, shown blue on the board).
waive:
  draft: true
  labels: ["blocked", "do-not-review"]

# Launch an AI code-review command for an MR from a button on the dashboard.
# The command is a template; radar fills placeholders and runs it locally
# (shell=False), then shows stdout as the rendered review. Available
# placeholders: {web_url} {mr_iid} {project_id} {source_branch}
# {target_branch} {title} {author}.
review:
  enabled: false
  # Invoke a prepared Claude Code skill headlessly. Make the run smooth AND safe:
  #  1. Pre-approve a NARROW, read-only allowlist in ~/.claude/settings.json
  #     under permissions.allow — e.g.
  #       ["Read", "Grep", "Glob", "WebFetch(domain:gitlab.yourco.com)"]
  #     Add "Bash(git *)" ONLY if the skill reviews a local checkout. Do not
  #     grant blanket Bash or any write/edit tools.
  #  2. --permission-mode dontAsk : enforce that allowlist WITHOUT prompting.
  #     Anything not on the list is auto-DENIED (fails closed), so the run never
  #     blocks and never silently gains capabilities.
  #     Do NOT use --permission-mode bypassPermissions: it allows everything
  #     (fails open). Only consider it inside a locked-down sandbox (container /
  #     firejail / nsjail) with no network to internal services and no secrets
  #     in the environment.
  #  3. --output-format stream-json --verbose : emit live events so the dashboard
  #     shows real-time progress. Plain commands still work (stdout -> progress
  #     log); they just aren't as granular.
  command: 'claude -p --permission-mode dontAsk --output-format stream-json --verbose "/code-review {web_url}"'
  working_dir: null          # run the command here (e.g. a repo checkout); null = radar's CWD
  timeout_seconds: 600

# Jira association. radar recognises issue keys (PROJ-123) in each MR's branch,
# title, and description, shows them as links on the board, and passes them to
# the QA test-plan command. base_url builds the browse links; project_keys is
# an optional filter so unrelated keys aren't picked up.
jira:
  base_url: https://yourco.atlassian.net
  project_keys: [PROJ, BUG]

# Launch a QA test-plan generator for an MR from a button on the dashboard.
# Same shape as `review`. Extra placeholders: {jira_keys} (space-separated) and
# {jira_keys_csv}. The skill fetches the ticket(s) itself and can write the plan
# back to Jira; radar keeps a copy and shows it on the board.
qa:
  enabled: false
  command: 'claude -p --permission-mode dontAsk --output-format stream-json --verbose "/qa-testplan {jira_keys}"'
  working_dir: null
  timeout_seconds: 900

# Gamification config is consumed in Phase 3; kept here so the file is stable.
gamification:
  points:
    review_within_sla: 10
    fast_first_response_bonus: 5 # first response within 25% of SLA budget
    substantive_review_bonus: 5 # >= 2 discussion threads opened
    orphan_pickup: 8 # reviewed an MR with no assigned reviewer
    bare_approval: 2 # approval with zero comments — deliberately low
  streak_bonus_per_day: 1
